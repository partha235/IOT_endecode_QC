<!DOCTYPE html>
<html>
<head>
<title>ESP32 Quantum IoT Dashboard</title>
<meta http-equiv="refresh" content="2">
<style>
body{{
background:#0d1117;
color:#c9d1d9;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}}
h1{{
color:#00d4ff;
text-shadow:0 0 10px #00d4ff;
}}
.container{{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}}
.card{{
background:#161b22;
padding:30px;
width:220px;
border-radius:15px;
font-size:22px;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}}
.card:hover{{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 25px rgba(0,212,255,0.5);
}}
.value{{
font-size:45px;
font-weight:bold;
margin-top:10px;
}}
.temp{{color:#ff6b6b;}}
.hum{{color:#4ecdc4;}}
.press{{color:#f9ca24;}}
.bar{{
height:10px;
background:#222;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}}
.fill{{
height:100%;
border-radius:10px;
}}
.temp-fill{{background:#ff6b6b;width:{{latest_temp*2}}%;}}
.hum-fill{{background:#4ecdc4;width:{{latest_hum}}%;}}
.press-fill{{background:#f9ca24;width:{{latest_press/12}}%;}}
.footer{{
margin-top:40px;
opacity:0.6;
font-size:14px;
}}
</style>
</head>
<body>
<h1>Quantum Secured IoT Dashboard</h1>
<div class="container">
<div class="card">
 🌡️Temperature
<div class="value temp">{latest_temp} °C</div>
<div class="bar"><div class="fill temp-fill"></div></div>
</div>
<div class="card">
 🌬️Humidity
<div class="value hum">{latest_hum} %</div>
<div class="bar"><div class="fill hum-fill"></div></div>
</div>
<div class="card">
 🗜️Pressure
<div class="value press">{latest_press} hPa</div>
<div class="bar"><div class="fill press-fill"></div></div>
</div>
</div>
<div class="footer">
Auto refresh every 2 seconds
</div>
</body>
</html>
